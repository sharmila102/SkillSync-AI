<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSync AI - Sign Up</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 position-relative py-5">
    <div class="bg-glow"></div>
    <div class="bg-glow-right"></div>

    <div class="container" style="max-width: 500px;">
        <div class="text-center mb-4">
            <a href="/" class="d-inline-flex align-items-center text-decoration-none mb-2">
                <i class="bi bi-cpu-fill fs-1 text-neon-blue me-2"></i>
                <span class="fs-2 fw-bold text-white font-outfit">SkillSync AI</span>
            </a>
            <p class="text-secondary">Create an account to start upskilling</p>
        </div>

        <div class="glass-card">
            <h2 class="h3 fw-bold text-center mb-4 font-outfit">Get Started</h2>

            <!-- Registration Form -->
            <form th:action="@{/register}" th:object="${user}" method="post">
                
                <!-- Full Name -->
                <div class="mb-3">
                    <label for="fullName" class="form-label text-secondary small">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary border-opacity-10 text-secondary">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control form-glass-control" placeholder="John Doe" required>
                    </div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">Name Error</div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary small">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary border-opacity-10 text-secondary">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" id="email" th:field="*{email}" class="form-control form-glass-control" placeholder="name@example.com" required>
                    </div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</div>
                </div>

                <!-- Job Role Selection -->
                <div class="mb-3">
                    <label for="jobRole" class="form-label text-secondary small">Target Job Role</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary border-opacity-10 text-secondary">
                            <i class="bi bi-briefcase"></i>
                        </span>
                        <select id="jobRole" th:field="*{jobRole}" class="form-select form-glass-control" required>
                            <option value="" disabled selected style="background-color: var(--bg-secondary); color: var(--text-secondary);">Select role...</option>
                            <option value="Java Developer" style="background-color: var(--bg-secondary); color: var(--text-primary);">Java Developer</option>
                            <option value="Python Developer" style="background-color: var(--bg-secondary); color: var(--text-primary);">Python Developer</option>
                            <option value="Full Stack Developer" style="background-color: var(--bg-secondary); color: var(--text-primary);">Full Stack Developer</option>
                            <option value="Backend Developer" style="background-color: var(--bg-secondary); color: var(--text-primary);">Backend Developer</option>
                            <option value="Frontend Developer" style="background-color: var(--bg-secondary); color: var(--text-primary);">Frontend Developer</option>
                            <option value="DevOps Engineer" style="background-color: var(--bg-secondary); color: var(--text-primary);">DevOps Engineer</option>
                            <option value="Data Scientist" style="background-color: var(--bg-secondary); color: var(--text-primary);">Data Scientist</option>
                            <option value="Mobile Developer" style="background-color: var(--bg-secondary); color: var(--text-primary);">Mobile Developer</option>
                        </select>
                    </div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('jobRole')}" th:errors="*{jobRole}">Job Role Error</div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary small">Password (Min 6 chars)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary border-opacity-10 text-secondary">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" id="password" th:field="*{password}" class="form-control form-glass-control" placeholder="••••••••" required>
                    </div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password Error</div>
                </div>

                <button type="submit" class="btn btn-neon w-100 mb-3">
                    Sign Up <i class="bi bi-person-plus ms-1"></i>
                </button>

                <div class="text-center">
                    <span class="text-secondary small">Already have an account? </span>
                    <a href="/login" class="text-neon-blue small text-decoration-none fw-bold">Log In</a>
                </div>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="/" class="text-secondary small text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i> Back to Home
            </a>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
